services:
  mongodb:
    image: mongo:7
    container_name: webscraping-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: webscraping
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
